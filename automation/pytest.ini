[pytest]
testpaths = tests
addopts =
    -ra
    --strict-markers
    --alluredir=reports/allure-results
markers =
    smoke: core smoke tests
    ui: web UI automation tests
    api: HTTP/API tests
    regression: broader business regression tests
    account: account and sign-in tests
    catalog: catalog and product tests
    cart: shopping cart tests
    order: checkout and order tests
